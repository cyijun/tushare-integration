id: 2008
name: dwd_stock_cashflow
comment: 股票现金流量表标准层
builder: raw_versioned
source:
  table_name: cashflow_raw
  schema_name: stock/financial/cashflow
instrument_type: stock
instrument_id_expr: "concat('stock:', src.ts_code)"
source_code_expr: src.ts_code
exchange_expr: "arrayElement(splitByChar('.', assumeNotNull(src.ts_code)), 2)"
event_date_expr: src.end_date
calendar_date_expr: src.ann_date
available_trade_date_expr: coalesce(calendar_map.next_trade_date, src.ann_date, src.end_date)
partition_key:
  - toYear(available_trade_date)
indexes:
  - name: dwd_stock_cashflow_idx
    columns:
      - instrument_id
      - event_date
      - sys_from
