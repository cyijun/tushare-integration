id: 2016
name: dwd_stock_chip_distribution
comment: 股票筹码分布表现标准层
builder: raw_versioned
source:
  table_name: cyq_perf_raw
  schema_name: stock/special/cyq_perf
instrument_type: stock
instrument_id_expr: "concat('stock:', src.ts_code)"
source_code_expr: src.ts_code
exchange_expr: "arrayElement(splitByChar('.', assumeNotNull(src.ts_code)), 2)"
event_date_expr: src.trade_date
calendar_date_expr: src.trade_date
available_trade_date_expr: coalesce(calendar_map.next_trade_date, src.trade_date)
partition_key:
  - toYear(available_trade_date)
indexes:
  - name: dwd_stock_chip_distribution_idx
    columns:
      - instrument_id
      - event_date
      - sys_from
