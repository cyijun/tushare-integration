id: 4001
api_name: stock_st
name: stock_st
comment: ST股票列表
dependencies:
  - stock/basic/trade_cal
primary_key:
  - ts_code
  - trade_date
  - type
indexes: []
columns:
  - name: ts_code
    data_type: str
    length: 16
    default: ""
    comment: 股票代码
  - name: name
    data_type: str
    length: 255
    default: ""
    comment: 股票名称
  - name: trade_date
    data_type: date
    length: 0
    default: "1970-01-01"
    comment: 交易日期
  - name: type
    data_type: str
    length: 64
    default: ""
    comment: 类型
  - name: type_name
    data_type: str
    length: 255
    default: ""
    comment: 类型名称
