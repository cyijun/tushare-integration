id: 4025
api_name: dc_concept_cons
name: dc_concept_cons
comment: 题材成分（东方财富）
dependencies:
  - stock/market/dc_concept
  - stock/basic/trade_cal
primary_key:
  - ts_code
  - trade_date
  - theme_code
indexes: []
columns:
  - name: ts_code
    data_type: str
    length: 16
    default: ""
    comment: 股票代码
  - name: trade_date
    data_type: date
    length: 0
    default: "1970-01-01"
    comment: 交易日期
  - name: name
    data_type: str
    length: 255
    default: ""
    comment: 名称
  - name: theme_code
    data_type: str
    length: 16
    default: ""
    comment: 主题code
  - name: industry_code
    data_type: str
    length: 16
    default: ""
    comment: 所属行业code
  - name: industry
    data_type: str
    length: 255
    default: ""
    comment: 所属行业
  - name: reason
    data_type: str
    length: 1024
    default: ""
    comment: 入选原因
  - name: hot_num
    data_type: str
    length: 64
    default: ""
    comment: 热点排行
