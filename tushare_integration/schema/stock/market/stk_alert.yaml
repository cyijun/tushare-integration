id: 4009
api_name: stk_alert
name: stk_alert
comment: 交易所重点提示证券
dependencies:
  - stock/basic/trade_cal
primary_key:
  - ts_code
  - start_date
  - end_date
  - type
indexes: []
columns:
  - name: ts_code
    data_type: str
    length: 16
    default: ""
    comment: 股票代码
  - name: name
    data_type: str
    length: 255
    default: ""
    comment: 股票名称
  - name: start_date
    data_type: date
    length: 0
    default: "1970-01-01"
    comment: 交易所重点提示起始日期
  - name: end_date
    data_type: date
    length: 0
    default: "1970-01-01"
    comment: 交易所重点提示参考截至日期
  - name: type
    data_type: str
    length: 64
    default: ""
    comment: 提示类型
