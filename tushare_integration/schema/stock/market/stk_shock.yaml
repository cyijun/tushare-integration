id: 4007
api_name: stk_shock
name: stk_shock
comment: 个股异常波动
dependencies:
  - stock/basic/trade_cal
primary_key:
  - ts_code
  - trade_date
  - reason
  - period
indexes: []
columns:
  - name: ts_code
    data_type: str
    length: 16
    default: ""
    comment: 股票代码
  - name: trade_date
    data_type: date
    length: 0
    default: "1970-01-01"
    comment: 公告日期
  - name: name
    data_type: str
    length: 255
    default: ""
    comment: 股票名称
  - name: trade_market
    data_type: str
    length: 64
    default: ""
    comment: 交易所
  - name: reason
    data_type: str
    length: 1024
    default: ""
    comment: 异常说明
  - name: period
    data_type: str
    length: 255
    default: ""
    comment: 异常期间
