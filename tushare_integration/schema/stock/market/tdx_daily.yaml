  - name: float_share
    data_type: float
    length: 0
    default: "0.0"
    comment: 流通股
  - name: total_share
    data_type: float
    length: 0
    default: "0.0"
    comment: 总股本
  - name: bm_buy_net
    data_type: float
    length: 0
    default: "0.0"
