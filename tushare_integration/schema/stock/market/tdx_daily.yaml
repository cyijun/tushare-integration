  - name: 5day
    data_type: float
    length: 0
    default: "0.0"
    comment: 5日涨幅
  - name: 10day
    data_type: float
    length: 0
    default: "0.0"
    comment: 10日涨幅
  - name: 20day
    data_type: float
    length: 0
    default: "0.0"
    comment: 20日涨幅
  - name: 60day
    data_type: float
    length: 0
    default: "0.0"
    comment: 60日涨幅
  - name: mtd
    data_type: float
    length: 0
    default: "0.0"
    comment: 月初至今
  - name: ytd
    data_type: float
    length: 0
    default: "0.0"
    comment: 年初至今
  - name: 1year
    data_type: float
    length: 0
