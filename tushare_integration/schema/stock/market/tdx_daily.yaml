id: 4023
api_name: tdx_daily
name: tdx_daily
comment: 通达信板块行情
dependencies:
  - stock/basic/trade_cal
primary_key:
  - ts_code
  - trade_date
indexes: []
columns:
  - name: ts_code
    data_type: str
    length: 16
    default: ""
    comment: 板块代码
  - name: trade_date
    data_type: date
    length: 0
    default: "1970-01-01"
    comment: 交易日期
  - name: close
    data_type: float
    length: 0
    default: "0.0"
    comment: 收盘点位
  - name: open
    data_type: float
    length: 0
    default: "0.0"
    comment: 开盘点位
  - name: high
    data_type: float
    length: 0
    default: "0.0"
    comment: 最高点位
  - name: low
    data_type: float
    length: 0
    default: "0.0"
    comment: 最低点位
  - name: pre_close
    data_type: float
    length: 0
    default: "0.0"
    comment: 昨日收盘点
  - name: change
    data_type: float
    length: 0
    default: "0.0"
    comment: 涨跌点位
  - name: pct_change
    data_type: float
    length: 0
    default: "0.0"
    comment: 涨跌幅
  - name: vol
    data_type: float
    length: 0
    default: "0.0"
    comment: 成交量
  - name: amount
    data_type: float
    length: 0
    default: "0.0"
    comment: 成交额
  - name: rise
    data_type: str
    length: 64
    default: ""
    comment: 收盘涨速
  - name: vol_ratio
    data_type: float
    length: 0
    default: "0.0"
    comment: 量比
  - name: turnover_rate
    data_type: float
    length: 0
    default: "0.0"
    comment: 换手
  - name: swing
    data_type: float
    length: 0
    default: "0.0"
    comment: 振幅
  - name: up_num
    data_type: int
    length: 0
    default: "0"
    comment: 上涨家数
  - name: down_num
    data_type: int
    length: 0
    default: "0"
    comment: 下跌家数
  - name: limit_up_num
    data_type: int
    length: 0
    default: "0"
    comment: 涨停家数
  - name: limit_down_num
    data_type: int
    length: 0
    default: "0"
