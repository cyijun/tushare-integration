id: 4021
api_name: tdx_index
name: tdx_index
comment: 通达信板块信息
dependencies:
  - stock/basic/trade_cal
primary_key:
  - ts_code
  - trade_date
indexes: []
columns:
  - name: ts_code
    data_type: str
    length: 16
    default: ""
    comment: 板块代码
  - name: trade_date
    data_type: date
    length: 0
    default: "1970-01-01"
    comment: 交易日期
  - name: name
    data_type: str
    length: 255
    default: ""
    comment: 板块名称
  - name: idx_type
    data_type: str
    length: 64
    default: ""
    comment: 板块类型
  - name: idx_count
    data_type: int
    length: 0
    default: "0"
    comment: 成分个数
  - name: total_share
    data_type: float
    length: 0
    default: "0.0"
    comment: 总股本
  - name: float_share
    data_type: float
    length: 0
    default: "0.0"
    comment: 流通股
  - name: total_mv
    data_type: float
    length: 0
    default: "0.0"
    comment: 总市值
  - name: float_mv
    data_type: float
    length: 0
    default: "0.0"
    comment: 流通市值
