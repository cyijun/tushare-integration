id: 4016
api_name: moneyflow_cnt_ths
name: moneyflow_cnt_ths
comment: 板块资金流向（THS)
dependencies:
  - stock/basic/trade_cal
primary_key:
  - ts_code
  - trade_date
indexes: []
columns:
  - name: trade_date
    data_type: date
    length: 0
    default: "1970-01-01"
    comment: 交易日期
  - name: ts_code
    data_type: str
    length: 16
    default: ""
    comment: 板块代码
  - name: name
    data_type: str
    length: 255
    default: ""
    comment: 板块名称
  - name: lead_stock
    data_type: str
    length: 255
    default: ""
    comment: 领涨股票名称
  - name: close_price
    data_type: float
    length: 0
    default: "0.0"
    comment: 最新价
  - name: pct_change
    data_type: float
    length: 0
    default: "0.0"
    comment: 行业涨跌幅
  - name: industry_index
    data_type: float
    length: 0
    default: "0.0"
    comment: 板块指数点位
  - name: company_num
    data_type: int
    length: 0
    default: "0"
    comment: 公司数量
  - name: pct_change_stock
    data_type: float
    length: 0
    default: "0.0"
    comment: 领涨股涨跌幅
  - name: net_buy_amount
    data_type: float
    length: 0
    default: "0.0"
    comment: 流入资金
  - name: net_sell_amount
    data_type: float
    length: 0
    default: "0.0"
    comment: 流出资金
  - name: net_amount
    data_type: float
    length: 0
    default: "0.0"
    comment: 净额
