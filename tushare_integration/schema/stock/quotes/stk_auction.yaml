id: 4019
api_name: stk_auction
name: stk_auction
comment: 开盘竞价成交
dependencies:
  - stock/basic/trade_cal
primary_key:
  - ts_code
  - trade_date
indexes: []
columns:
  - name: ts_code
    data_type: str
    length: 16
    default: ""
    comment: 股票代码
  - name: trade_date
    data_type: date
    length: 0
    default: "1970-01-01"
    comment: 数据日期
  - name: vol
    data_type: int
    length: 0
    default: "0"
    comment: 成交量
  - name: price
    data_type: float
    length: 0
    default: "0.0"
    comment: 成交均价
  - name: amount
    data_type: float
    length: 0
    default: "0.0"
    comment: 成交金额
  - name: pre_close
    data_type: float
    length: 0
    default: "0.0"
    comment: 昨收价
  - name: turnover_rate
    data_type: float
    length: 0
    default: "0.0"
    comment: 换手率
  - name: volume_ratio
    data_type: float
    length: 0
    default: "0.0"
    comment: 量比
  - name: float_share
    data_type: float
    length: 0
    default: "0.0"
    comment: 流通股本
