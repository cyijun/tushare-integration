id: 4013
api_name: stk_auction_c
name: stk_auction_c
comment: 股票收盘集合竞价数据
dependencies:
  - stock/basic/trade_cal
primary_key:
  - ts_code
  - trade_date
indexes: []
columns:
  - name: ts_code
    data_type: str
    length: 16
    default: ""
    comment: 股票代码
  - name: trade_date
    data_type: date
    length: 0
    default: "1970-01-01"
    comment: 交易日期
  - name: close
    data_type: float
    length: 0
    default: "0.0"
    comment: 收盘集合竞价收盘价
  - name: open
    data_type: float
    length: 0
    default: "0.0"
    comment: 收盘集合竞价开盘价
  - name: high
    data_type: float
    length: 0
    default: "0.0"
    comment: 收盘集合竞价最高价
  - name: low
    data_type: float
    length: 0
    default: "0.0"
    comment: 收盘集合竞价最低价
  - name: vol
    data_type: float
    length: 0
    default: "0.0"
    comment: 收盘集合竞价成交量
  - name: amount
    data_type: float
    length: 0
    default: "0.0"
    comment: 收盘集合竞价成交额
  - name: vwap
    data_type: float
    length: 0
    default: "0.0"
    comment: 收盘集合竞价均价
