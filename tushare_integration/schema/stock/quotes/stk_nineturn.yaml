id: 4014
api_name: stk_nineturn
name: stk_nineturn
comment: 神奇九转指标
dependencies:
  - stock/basic/stock_basic
primary_key:
  - ts_code
  - trade_date
  - freq
indexes: []
columns:
  - name: ts_code
    data_type: str
    length: 16
    default: ""
    comment: 股票代码
  - name: trade_date
    data_type: datetime
    length: 0
    default: "1970-01-01 00:00:00"
    comment: 交易日期
  - name: freq
    data_type: str
    length: 16
    default: ""
    comment: 频率
  - name: open
    data_type: float
    length: 0
    default: "0.0"
    comment: 开盘价
  - name: high
    data_type: float
    length: 0
    default: "0.0"
    comment: 最高价
  - name: low
    data_type: float
    length: 0
    default: "0.0"
    comment: 最低价
  - name: close
    data_type: float
    length: 0
    default: "0.0"
    comment: 收盘价
  - name: vol
    data_type: float
    length: 0
    default: "0.0"
    comment: 成交量
  - name: amount
    data_type: float
    length: 0
    default: "0.0"
    comment: 成交额
  - name: up_count
    data_type: float
    length: 0
    default: "0.0"
    comment: 上九转计数
  - name: down_count
    data_type: float
    length: 0
    default: "0.0"
    comment: 下九转计数
  - name: nine_up_turn
    data_type: str
    length: 32
    default: ""
    comment: 是否上九转
  - name: nine_down_turn
    data_type: str
    length: 32
    default: ""
    comment: 是否下九转
