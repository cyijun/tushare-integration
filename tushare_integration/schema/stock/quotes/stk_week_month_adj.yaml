    length: 16
    default: ""
    comment: 股票代码
  - name: trade_date
    data_type: date
    length: 0
    default: "1970-01-01"
    comment: 交易日期
  - name: end_date
    data_type: date
    length: 0
    default: "1970-01-01"
    comment: 计算截至日期
  - name: freq
    data_type: str
    length: 16
    default: ""
    comment: 频率
  - name: open
    data_type: float
    length: 0
    default: "0.0"
    comment: 开盘价
  - name: high
    data_type: float
    length: 0
    default: "0.0"
    comment: 最高价
  - name: low
    data_type: float
    length: 0
    default: "0.0"
    comment: 最低价
  - name: close
    data_type: float
    length: 0
    default: "0.0"
    comment: 收盘价
  - name: pre_close
    data_type: float
    length: 0
    default: "0.0"
    comment: 上一周期收盘价
  - name: open_qfq
    data_type: float
    length: 0
    default: "0.0"
    comment: 前复权开盘价
  - name: high_qfq
    data_type: float
    length: 0
    default: "0.0"
    comment: 前复权最高价
  - name: low_qfq
    data_type: float
    length: 0
    default: "0.0"
    comment: 前复权最低价
  - name: close_qfq
    data_type: float
    length: 0
    default: "0.0"
    comment: 前复权收盘价
  - name: open_hfq
    data_type: float
    length: 0
    default: "0.0"
    comment: 后复权开盘价
  - name: high_hfq
    data_type: float
    length: 0
    default: "0.0"
    comment: 后复权最高价
  - name: low_hfq
    data_type: float
    length: 0
    default: "0.0"
    comment: 后复权最低价
  - name: close_hfq
    data_type: float
    length: 0
    default: "0.0"
    comment: 后复权收盘价
  - name: vol
    data_type: float
    length: 0
    default: "0.0"
    comment: 成交量
  - name: amount
    data_type: float
    length: 0
    default: "0.0"
    comment: 成交额
  - name: change
    data_type: float
    length: 0
    default: "0.0"
    comment: 涨跌额
  - name: pct_chg
    data_type: float
    length: 0
    default: "0.0"
    comment: 涨跌幅
